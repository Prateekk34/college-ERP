{% extends "base.html" %}

{% block title %}Add Department{% endblock %}
{% block page_title %}Add Department{% endblock %}

{% block content %}
<div class="page-card">
    <h4 class="mb-3">Add Department</h4>

    <form method="POST">
        {% csrf_token %}

        {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger small mt-1">{{ field.errors }}</div>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit" class="btn btn-success">Save</button>
        <a href="{% url 'department_list' %}" class="btn btn-secondary">Back</a>
    </form>
</div>
{% endblock %}
