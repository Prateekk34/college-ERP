{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Add Subject</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}

                    <button type="submit" class="btn btn-success">Save Subject</button>
                    <a href="/subjects/" class="btn btn-secondary">Back</a>
                </form>
            </div>
        </div>
    </div>
</div>

{% endblock %}
