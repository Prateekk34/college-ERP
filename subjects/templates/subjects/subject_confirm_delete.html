{% extends "base.html" %}

{% block title %}Delete Subject{% endblock %}
{% block page_title %}Delete Subject{% endblock %}

{% block content %}
<div class="page-card">
    <h3 class="mb-3">Delete Subject</h3>
    <p>Are you sure you want to delete <strong>{{ subject.name }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'subject_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
