<!DOCTYPE html>
<html>
<head>
    <title>College ERP</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .sidebar {
            width: 200px;
            height: 100vh;
            background: #2c3e50;
            color: white;
            position: fixed;
            padding: 20px;
        }

        .sidebar h2 {
            color: #1abc9c;
        }

        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            margin: 15px 0;
        }

        .content {
            margin-left: 220px;
            padding: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }

        th {
            background: #1abc9c;
            color: white;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>College ERP</h2>
    <a href="/">Dashboard</a>
    <a href="/students/">Students</a>
</div>

<div class="content">
    {% block content %}{% endblock %}
</div>

</body>
</html>
