{% extends "base.html" %}
{% block title %}Delete Installment{% endblock %}
{% block page_title %}Delete Installment{% endblock %}

{% block content %}
<div class="page-card">
    <p>Are you sure you want to delete this installment?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'student_fee_detail' installment.student_fee.id %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
