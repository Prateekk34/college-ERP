<!DOCTYPE html>
<html>
<head>
    <title>College ERP Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark d-flex justify-content-center align-items-center vh-100">

<div class="card shadow p-4" style="width: 380px; border-radius: 16px;">
    <h3 class="text-center mb-3">College ERP Login</h3>
    <p class="text-center text-muted mb-4">Login to continue</p>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Username</label>
            {{ form.username }}
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            {{ form.password }}
        </div>

        <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    <div class="text-center mt-3">
        <small>
            Don't have an account?
            <a href="{% url 'signup' %}">Create Account</a>
        </small>
    </div>

    {% if messages %}
        <div class="mt-3">
            {% for message in messages %}
                <div class="alert alert-danger py-2 mb-2">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
</div>

</body>
</html>
