{% extends "base.html" %}

{% block title %}Delete Notice{% endblock %}
{% block page_title %}Delete Notice{% endblock %}

{% block content %}
<div class="page-card">
    <h5>Are you sure you want to delete this notice?</h5>

    <p><strong>{{ notice.title }}</strong></p>
    <p>{{ notice.message }}</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'notice_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
