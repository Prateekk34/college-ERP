{% extends "base.html" %}

{% block title %}Delete Exam{% endblock %}
{% block page_title %}Delete Exam{% endblock %}

{% block content %}
<div class="page-card">
    <h4 class="mb-3">Delete Exam</h4>
    <p>Are you sure you want to delete <strong>{{ exam.title }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'exam_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
