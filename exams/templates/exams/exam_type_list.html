{% extends "base.html" %}

{% block title %}Exam Types{% endblock %}
{% block page_title %}Exam Types{% endblock %}

{% block content %}
<div class="page-card">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4 class="mb-0">Exam Types</h4>
        <a href="{% url 'exam_type_add' %}" class="btn btn-primary">Add Exam Type</a>
    </div>

    <ul class="list-group">
        {% for item in types %}
            <li class="list-group-item">{{ item.name }}</li>
        {% empty %}
            <li class="list-group-item text-muted">No exam types found.</li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
