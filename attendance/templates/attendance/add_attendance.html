{% extends "base.html" %}

{% block title %}Add Attendance{% endblock %}
{% block page_title %}Add Attendance{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="page-card">
            <h3 class="mb-4">Add Attendance</h3>

            {% if form.errors %}
                <div class="alert alert-danger">
                    {{ form.errors }}
                </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}

                <div class="mt-3">
                    <button type="submit" class="btn btn-success">Save Attendance</button>
                    <a href="{% url 'attendance_list' %}" class="btn btn-secondary">Back</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
