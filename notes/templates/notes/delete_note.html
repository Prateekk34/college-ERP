{% extends "base.html" %}

{% block title %}Delete Note{% endblock %}
{% block page_title %}Delete Note{% endblock %}

{% block content %}
<div class="page-card">
    <h4 class="mb-3">Delete Note</h4>
    <p>Are you sure you want to delete <strong>{{ note.title }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'faculty_note_list' %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
